# ──────────────────────────────────────────────────────────────────────────────
# ProductIQ Frontend — nginx Configuration
#
# Serves static React build + proxies /api to the backend service.
# In docker-compose, the backend is at http://api:8000.
# In standalone deployment, set BACKEND_URL env or replace the upstream.
# ──────────────────────────────────────────────────────────────────────────────

# Gzip compression for faster page loads
gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

# Upstream backend (override via env in docker-compose)
upstream backend {
    server api:8000;
    # Fallback if api is not resolvable
    # server 127.0.0.1:8000 backup;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (for any future file uploads)
    client_max_body_size 10m;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support: disable buffering, long timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket support (for future realtime features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health check proxy (for container orchestration) ───────────────────────
    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
    }

    # ── API docs ───────────────────────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend/docs;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://backend/redoc;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Static files (React SPA) ───────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback: serve index.html for all routes (client-side routing)
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite uses content hashes)
        location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Don't cache index.html (always serve latest version)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            access_log off;
        }
    }
}
