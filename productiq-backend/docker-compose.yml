# ──────────────────────────────────────────────────────────────────────────────
# ProductIQ — Backend-Only Docker Compose (development)
#
# For full-stack production (frontend + backend + nginx), use the root-level
# docker-compose.yml in the project root instead.
#
# This file is for backend-only development: API + worker + beat + Redis.
# Usage: docker compose up -d
# ──────────────────────────────────────────────────────────────────────────────

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info --concurrency=2 -Q pipeline,monitoring,default
    restart: unless-stopped

  beat:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A celery_app beat --loglevel=info
    restart: unless-stopped

  flower:
    build: .
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A celery_app flower --port=5555 --broker_api=redis://redis:6379/0
    restart: unless-stopped
    profiles: ["monitoring"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
