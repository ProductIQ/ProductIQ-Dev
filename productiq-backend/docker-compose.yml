version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2 --reload
    volumes:
      - .:/app     # Hot reload in development — remove for production
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info --concurrency=2 -Q pipeline,monitoring,default
    restart: unless-stopped

  beat:
    build: .
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    restart: unless-stopped

  flower:
    build: .
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A celery_app flower --port=5555 --broker_api=redis://redis:6379/0
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data: