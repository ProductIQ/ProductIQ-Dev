# ──────────────────────────────────────────────────────────────────────────────
# ProductIQ — Fly.io Deployment Config
#
# Deploys the backend API as the primary service.
# Worker, beat, and frontend are deployed as separate fly apps.
#
# Setup:
#   fly launch --config fly.toml
#   fly secrets set SUPABASE_URL=... SUPABASE_SERVICE_KEY=... GEMINI_API_KEY=...
# ──────────────────────────────────────────────────────────────────────────────

app = "productiq-api"
primary_region = "sin"  # Singapore — closest to India

[build]
  dockerfile = "productiq-backend/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false  # API must stay up for SSE
  auto_start_machines = true
  min_machines_running = 1

[http_service.concurrency]
  type = "requests"
  soft_limit = 50
  hard_limit = 100

# Health check
[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "40s"
  method = "get"
  path = "/health"

# Resource allocation (2 CPU, 4GB RAM for CrewAI + spaCy + BERTopic)
[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 4096

# Environment variables (set via: fly secrets set KEY=VALUE)
[env]
  APP_ENV = "production"
  USE_CELERY = "true"
  REDIS_URL = "redis://productiq-redis.internal:6379/0"

# ── Worker process (runs in same VM via process group) ────────────────────────
[processes]
  api = "uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2"
  worker = "celery -A celery_app worker --loglevel=info --concurrency=2 -Q pipeline,monitoring,default"
  beat = "celery -A celery_app beat --loglevel=info"
